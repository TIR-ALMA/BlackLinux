# ============================================================
#  grub.cfg — загрузчик Black Linux
# ============================================================

set default=0
set timeout=5
set timeout_style=menu

# Цветовая схема (только чёрный)
set color_normal=white/black
set color_highlight=light-gray/black
set menu_color_normal=white/black
set menu_color_highlight=light-gray/black

# Загрузка шрифта
if loadfont /boot/grub/fonts/unicode.pf2; then
    set gfxmode=1920x1080,1280x720,auto
    insmod all_video
    insmod gfxterm
    terminal_output gfxterm
fi

# ASCII баннер
echo ""
echo "  ██████╗ ██╗      █████╗  ██████╗██╗  ██╗    ██╗     ██╗███╗   ██╗██╗   ██╗██╗  ██╗"
echo "  ██╔══██╗██║     ██╔══██╗██╔════╝██║ ██╔╝    ██║     ██║████╗  ██║██║   ██║╚██╗██╔╝"
echo "  ██████╔╝██║     ███████║██║     █████╔╝     ██║     ██║██╔██╗ ██║██║   ██║ ╚███╔╝ "
echo "  ██╔══██╗██║     ██╔══██║██║     ██╔═██╗     ██║     ██║██║╚██╗██║██║   ██║ ██╔██╗ "
echo "  ██████╔╝███████╗██║  ██║╚██████╗██║  ██╗    ███████╗██║██║ ╚████║╚██████╔╝██╔╝ ██╗"
echo "  ╚═════╝ ╚══════╝╚═╝  ╚═╝ ╚═════╝╚═╝  ╚═╝   ╚══════╝╚═╝╚═╝  ╚═══╝ ╚═════╝╚═╝  ╚═╝"
echo ""
echo "                    The Dark Side of Open Source"
echo ""

# ── Основная запись ──────────────────────────────────────────
menuentry "Black Linux" --class blacklinux --class gnu-linux --class gnu --class os {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod ext2
    insmod squash4
    search --no-floppy --label --set=root BLACKLINUX
    linux  /boot/vmlinuz boot=live quiet splash \
           mitigations=auto \
           elevator=bfq \
           transparent_hugepage=always \
           zswap.enabled=1 \
           zswap.compressor=lz4 \
           net.ifnames=0 \
           console=tty1
    initrd /boot/initrd.img
}

# ── Безопасный режим ─────────────────────────────────────────
menuentry "Black Linux (Безопасный режим)" --class blacklinux {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod ext2
    insmod squash4
    search --no-floppy --label --set=root BLACKLINUX
    linux  /boot/vmlinuz boot=live nomodeset nosplash \
           systemd.unit=rescue.target
    initrd /boot/initrd.img
}

# ── RAM режим (всё в памяти) ─────────────────────────────────
menuentry "Black Linux (Live RAM)" --class blacklinux {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod ext2
    insmod squash4
    search --no-floppy --label --set=root BLACKLINUX
    linux  /boot/vmlinuz boot=live toram quiet splash
    initrd /boot/initrd.img
}

# ── Режим Tor (принудительный) ───────────────────────────────
menuentry "Black Linux (Tor-only режим)" --class blacklinux {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod ext2
    insmod squash4
    search --no-floppy --label --set=root BLACKLINUX
    linux  /boot/vmlinuz boot=live quiet splash blacklinux.tor_only=1
    initrd /boot/initrd.img
}
